name: Auto Label PR

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  label:
    name: Auto Label
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Label based on files changed
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

      - name: Label based on PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const labels = [];
            
            // Check for conventional commit prefixes
            if (title.startsWith('feat:') || title.includes('[feature]')) {
              labels.push('feature');
            }
            if (title.startsWith('fix:') || title.includes('[fix]') || title.includes('[bug]')) {
              labels.push('bug');
            }
            if (title.startsWith('docs:') || title.includes('[docs]')) {
              labels.push('documentation');
            }
            if (title.startsWith('chore:') || title.includes('[chore]')) {
              labels.push('maintenance');
            }
            if (title.startsWith('refactor:') || title.includes('[refactor]')) {
              labels.push('refactor');
            }
            if (title.startsWith('perf:') || title.includes('[performance]')) {
              labels.push('performance');
            }
            if (title.startsWith('test:') || title.includes('[test]')) {
              labels.push('testing');
            }
            if (title.includes('breaking') || title.includes('!:')) {
              labels.push('breaking');
            }
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }

      - name: Label based on size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const total = additions + deletions;
            
            let sizeLabel = '';
            if (total < 10) sizeLabel = 'size/XS';
            else if (total < 100) sizeLabel = 'size/S';
            else if (total < 500) sizeLabel = 'size/M';
            else if (total < 1000) sizeLabel = 'size/L';
            else sizeLabel = 'size/XL';
            
            // Remove old size labels
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const sizeLabels = currentLabels.filter(l => l.name.startsWith('size/'));
            for (const label of sizeLabels) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: label.name
              });
            }
            
            // Add new size label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [sizeLabel]
            });
