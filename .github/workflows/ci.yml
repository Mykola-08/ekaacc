name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test -- --ci --coverage --reporters=default --reporters=jest-junit
        env:
          CI: true

      - name: Upload test coverage (conditional)
        run: |
          if [ -n "${CODECOV_TOKEN}" ]; then
            echo "Uploading coverage to Codecov";
            npm install -g codecov || echo "Failed installing codecov CLI";
            codecov -f ./coverage/coverage-final.json || echo "Codecov upload failed";
          else
            echo "No CODECOV_TOKEN secret configured; skipping coverage upload.";
          fi
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: junit.xml

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check build size
        run: |
          echo "## Build Size Report" >> $GITHUB_STEP_SUMMARY
          du -sh .next >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next
          retention-days: 7

  resend-health:
    name: Resend Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev
      - name: Check Resend configuration (conditional)
        run: |
          if [ -n "${RESEND_API_KEY}" ]; then
            echo "Running Resend health check";
            npm run check:resend;
          else
            echo "RESEND_API_KEY not set; skipping Resend health check.";
          fi
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

  playwright-e2e:
    name: E2E Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run Lighthouse CI (conditional)
        run: |
          if [ -n "${LHCI_GITHUB_APP_TOKEN}" ]; then
            npm install -g @lhci/cli;
            lhci autorun || echo "Lighthouse CI completed";
          else
            echo "LHCI_GITHUB_APP_TOKEN not set; skipping authenticated Lighthouse run.";
          fi
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  pr-comment:
    name: PR Comment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-test, playwright-e2e]
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `## 🚀 CI Results
            
            ✅ Build and tests passed successfully!
            
            - **Build**: Completed
            - **Unit Tests**: Passed
            - **E2E Tests**: Passed
            - **Type Check**: Passed
            - **Linting**: Passed
            
            Your changes are ready for review! 🎉`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })
