name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation,
# and allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    # For larger runners, replace with the label of your larger runner (e.g., ubuntu-4-core)
    # Copilot coding agent supports only Ubuntu x64 Linux runners.
    runs-on: ubuntu-latest

    # Keep within 59 minutes (Copilot requirement)
    timeout-minutes: 30

    # Lowest permissions needed for these steps.
    permissions:
      contents: read

    # NOTE: Only these fields are honored by Copilot for this job: steps, permissions, runs-on, services, snapshot, timeout-minutes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Set to true if you use Git LFS
          lfs: false

      # Install Supabase CLI and start local stack (emulator) for tests
      - name: Install Supabase CLI
        run: |
          curl -L https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar xz
          sudo mv supabase /usr/local/bin/supabase
          supabase --version

      - name: Check existing Supabase (reuse if running)
        id: check_supabase
        run: |
          set -e
          already=false
          apiUrl=""
          if command -v supabase >/dev/null 2>&1; then
            if supabase status --output json >/dev/null 2>&1; then
              supabase status --output json > supabase-status.json
              apiUrl=$(jq -r '.apiUrl' supabase-status.json)
              if [ -n "$apiUrl" ]; then
                code=$(curl -s -o /dev/null -w '%{http_code}' "$apiUrl" ) || true
                if [ "$code" = "200" ]; then
                  already=true
                fi
              fi
            fi
          fi
          echo "already_running=$already" >> $GITHUB_OUTPUT
          if [ -n "$apiUrl" ]; then echo "apiUrl=$apiUrl" >> $GITHUB_OUTPUT; fi

      - name: Start Supabase local stack
        if: ${{ steps.check_supabase.outputs.already_running != 'true' }}
        run: |
          supabase start
          supabase status --output json > supabase-status.json
          echo "Parsed Supabase status:" && cat supabase-status.json
          echo "NEXT_PUBLIC_SUPABASE_URL=$(jq -r '.apiUrl' supabase-status.json)" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(jq -r '.anonKey' supabase-status.json)" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(jq -r '.serviceRoleKey' supabase-status.json)" >> $GITHUB_ENV
      - name: Export existing Supabase status to env
        if: ${{ steps.check_supabase.outputs.already_running == 'true' }}
        run: |
          # if a running supabase was detected, ensure we have a status file
          if [ ! -f supabase-status.json ]; then supabase status --output json > supabase-status.json || true; fi
          if [ -f supabase-status.json ]; then
            echo "NEXT_PUBLIC_SUPABASE_URL=$(jq -r '.apiUrl' supabase-status.json)" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(jq -r '.anonKey' supabase-status.json)" >> $GITHUB_ENV
            echo "SUPABASE_SERVICE_ROLE_KEY=$(jq -r '.serviceRoleKey' supabase-status.json)" >> $GITHUB_ENV
          fi
        # Optional: If you set SUPABASE_ACCESS_TOKEN in repository/environment secrets, uncomment below.
        # env:
        #   SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Create CI .env.local defaults (only if emulator vars missing)
        run: |
          touch .env.local
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL}" ]; then echo "NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> .env.local; fi
          if [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]; then echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=local-anon-key" >> .env.local; fi
          echo "DISABLE_EXTERNAL_SERVICES=1" >> .env.local

      - name: Show environment summary (redacted keys)
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL"
          echo "Anon key length=${#NEXT_PUBLIC_SUPABASE_ANON_KEY}"
          echo "Service role key length=${#SUPABASE_SERVICE_ROLE_KEY}"
        shell: bash

      - name: Health check Supabase API
        run: |
          api="${NEXT_PUBLIC_SUPABASE_URL:-${{ steps.check_supabase.outputs.apiUrl }}}"
          echo "Pinging $api"
          if [ -z "$api" ]; then echo "No API URL available"; exit 0; fi
          # Simple HTTP ping; not failing the job if service returns non-200
          curl -I --max-time 5 "$api" || true

      - name: Install PostgreSQL client for seeding
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Seed database (optional)
        run: |
          if [ ! -f supabase/seed.sql ]; then echo "No seed.sql found; skipping"; exit 0; fi
          if [ ! -f supabase-status.json ]; then supabase status --output json > supabase-status.json || true; fi
          dbUrl=$(jq -r '.dbUrl // empty' supabase-status.json 2>/dev/null)
          if [ -z "$dbUrl" ]; then echo "dbUrl not found; skipping seed"; exit 0; fi
          echo "Seeding database at $dbUrl"
          PGPASSWORD="$(echo "$dbUrl" | sed -nE 's/.*:([^:@]+)@.*/\1/p')" psql "$dbUrl" -v ON_ERROR_STOP=1 -f supabase/seed.sql
        shell: bash

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (npm ci)
        run: npm ci

      # Detect if Playwright is present (helper)
      - name: Detect Playwright dependency
        id: detect_pkgs
        run: |
          if grep -q '"@playwright/test"' package.json || grep -q '"playwright"' package.json; then
            echo "has_playwright=true" >> $GITHUB_OUTPUT
          else
            echo "has_playwright=false" >> $GITHUB_OUTPUT
          fi

      - name: Install jq (for parsing JSON if not present)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install k6 (for load tests)
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      # Optional: Pre-install Playwright browsers to speed up e2e runs the agent may execute
      - name: Install Playwright browsers
        if: ${{ steps.detect_pkgs.outputs.has_playwright == 'true' }}
        run: npx playwright install --with-deps

      - name: Print tool versions
        run: |
          node -v
          npm -v
          npx --yes playwright --version || true

      # If you need Git LFS, enable lfs: true above and optionally fetch LFS objects explicitly:
      # - name: Pull LFS objects
      #   run: git lfs pull

      # If you need larger runners, set runs-on above to your larger runner label.
      # If using ARC-managed self-hosted runners, set runs-on to your scale set label.
