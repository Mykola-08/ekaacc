name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch:

jobs:
  stale:
    name: Mark Stale Issues and PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Stale action
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Issues
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed if no further activity occurs within the next 7 days.
            
            If you believe this issue is still relevant, please comment to keep it open.
            Thank you for your contributions! 🙏
          close-issue-message: |
            This issue was automatically closed due to inactivity.
            If you believe this issue should remain open, please reopen it and provide additional context.
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,critical,bug'
          
          # Pull Requests
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed if no further activity occurs within the next 7 days.
            
            Please update this PR or provide a status update.
            Thank you for your contributions! 🙏
          close-pr-message: |
            This pull request was automatically closed due to inactivity.
            If you'd like to continue working on this, please reopen it.
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,in-progress'
          
          # General settings
          operations-per-run: 100
          remove-stale-when-updated: true
          ascending: true
