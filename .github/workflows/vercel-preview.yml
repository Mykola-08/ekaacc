name: Vercel Preview Deployment

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  preview-comment:
    name: Preview Deployment Comment
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Wait for Vercel deployment
        uses: actions/github-script@v7
        with:
          script: |
            const maxAttempts = 30;
            const delayMs = 10000; // 10 seconds
            
            for (let i = 0; i < maxAttempts; i++) {
              const { data: statuses } = await github.rest.repos.listCommitStatusesForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.payload.pull_request.head.sha
              });
              
              const vercelStatus = statuses.find(s => s.context.includes('Vercel'));
              
              if (vercelStatus && vercelStatus.state === 'success') {
                const previewUrl = vercelStatus.target_url;
                
                const comment = `## 🚀 Vercel Preview Deployment
                
                ✅ **Preview deployed successfully!**
                
                🔗 **Preview URL**: ${previewUrl}
                
                ### Quick Links
                - 🌐 [Visit Preview](${previewUrl})
                - 📊 [View Deployment Logs](${previewUrl}/_logs)
                - 🔍 [Inspect Build](https://vercel.com/${context.repo.owner}/${context.repo.repo})
                
                ### Testing Checklist
                - [ ] UI looks correct
                - [ ] Authentication works
                - [ ] API endpoints respond
                - [ ] No console errors
                - [ ] Mobile responsive
                
                ---
                *This preview will be available until this PR is closed.*`;
                
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
                
                return;
              }
              
              await new Promise(resolve => setTimeout(resolve, delayMs));
            }
            
            console.log('Vercel deployment status not found after maximum attempts');

  lighthouse-preview:
    name: Lighthouse on Preview
    runs-on: ubuntu-latest
    needs: preview-comment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Vercel deployment URL
        id: vercel-url
        uses: actions/github-script@v7
        with:
          script: |
            const { data: statuses } = await github.rest.repos.listCommitStatusesForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha
            });
            
            const vercelStatus = statuses.find(s => s.context.includes('Vercel'));
            if (vercelStatus && vercelStatus.target_url) {
              core.setOutput('url', vercelStatus.target_url);
            }

      - name: Run Lighthouse
        if: steps.vercel-url.outputs.url
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: ${{ steps.vercel-url.outputs.url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
