name: Vercel Preview Deployment

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  preview-comment:
    name: Preview Deployment Comment
    outputs:
      preview_url: ${{ steps.wait-for-vercel.outputs.preview_url }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Wait for Vercel deployment
        id: wait-for-vercel
        uses: actions/github-script@v7
        with:
          script: |
            const maxAttempts = 30;
            const delayMs = 10000; // 10 seconds
            let previewUrl = '';
            for (let i = 0; i < maxAttempts; i++) {
              const { data: statuses } = await github.rest.repos.listCommitStatusesForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.payload.pull_request.head.sha
              });
              const vercelStatus = statuses.find(s => s.context.includes('Vercel'));
              if (vercelStatus && vercelStatus.state === 'success') {
                previewUrl = vercelStatus.target_url;
                break;
              }
              await new Promise(resolve => setTimeout(resolve, delayMs));
            }
            if (previewUrl) {
              core.setOutput('preview_url', previewUrl);
              const comment = `## 🚀 Vercel Preview Deployment\n\n✅ **Preview deployed successfully!**\n\n🔗 **Preview URL**: ${previewUrl}\n\n### Quick Links\n- 🌐 [Visit Preview](${previewUrl})\n- 📊 [View Deployment Logs](${previewUrl}/_logs)\n- 🔍 [Inspect Build](https://vercel.com/${context.repo.owner}/${context.repo.repo})\n\n### Testing Checklist\n- [ ] UI looks correct\n- [ ] Authentication works\n- [ ] API endpoints respond\n- [ ] No console errors\n- [ ] Mobile responsive\n\n---\n*This preview will be available until this PR is closed.*`;
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } else {
              console.log('Vercel deployment status not found after maximum attempts');
            }

  lighthouse-preview:
    name: Lighthouse on Preview
    runs-on: ubuntu-latest
    needs: preview-comment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Lighthouse
        if: needs.preview-comment.outputs.preview_url != ''
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: ${{ needs.preview-comment.outputs.preview_url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
